<!DOCTYPE html>
<html>
<head>
    <title>Organizer Page</title>
</head>
<body>

<h2>Add Event Details</h2>

<form id="eventForm">
    <input type="text" id="title" placeholder="Event Title" required><br><br>
    <input type="date" id="date" required><br><br>
    <textarea id="description" placeholder="Event Description"></textarea><br><br>
    <input type="url" id="formLink" placeholder="Google Form Link"><br><br>

    <button type="submit">Save Event</button>
</form>

<script src="script.js"></script>
</body>
</html>
